<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Dark background -->
  <circle cx="64" cy="64" r="62" fill="#0d0d0d"/>
  <!-- Red border ring -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="#e74c3c" stroke-width="6"/>
  <!-- Clock tick marks -->
  <line x1="64" y1="16" x2="64" y2="28" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <line x1="112" y1="64" x2="100" y2="64" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <line x1="64" y1="112" x2="64" y2="100" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <line x1="16" y1="64" x2="28" y2="64" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <!-- Hour hand (pointing ~10 o'clock) -->
  <line x1="64" y1="64" x2="38" y2="36" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  <!-- Minute hand (pointing ~2 o'clock, longer) -->
  <line x1="64" y1="64" x2="88" y2="26" stroke="#e74c3c" stroke-width="5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="64" cy="64" r="6" fill="#e74c3c"/>
</svg>
